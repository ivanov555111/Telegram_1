name: Build WeryGram APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Patcher Script
        run: |
          if [ -f patcher.py ]; then
            python patcher.py
          else
            echo "⚠️ Предупреждение: Файл patcher.py не найден в корне проекта!"
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_log.txt; exit ${PIPESTATUS[0]}

      - name: Show Build Log Tail on Failure
        if: failure()
        run: |
          echo "=== ПОСЛЕДНИЕ 200 СТРОК ==="
          tail -200 build_log.txt
          echo "=== ОШИБКИ ==="
          grep -n "Caused by\|error:\|FAILED\|Exception" build_log.txt | tail -50

      - name: Find APK Files
        run: |
          echo "=== Поиск APK ==="
          find . -name "*.apk" -type f

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeryGram-Debug-APK
          path: |
            **/*.apk
          if-no-files-found: error

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
